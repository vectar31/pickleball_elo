# fly.toml app configuration file generated for pickleball-elo on 2026-03-21T15:02:34+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pickleball-elo'
primary_region = 'bom'

[build]

[env]
  DB_PATH = '/data/pickleball.db'

[[mounts]]
  source = 'pickleball_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[services]]
  protocol = 'tcp'
  internal_port = 8000

  [[services.ports]]
    port = 80
    handlers = ['http']

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [services.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

  [[services.http_checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/players'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
